name: 03 - runners de workflow
on: push

jobs:
    ubuntu-echo:
        runs-on: ubuntu-latest
        steps:
            - name: "Mostrar SO"
              run: | 
                    echo "Este trabajo se ejecuta en runner de ubuntu" 
                    echo "$RUNNER_OS"
    windows-echo:
        runs-on: windows-latest
        steps:
            - name: "Mostrar SO"
              shell: bash
              run: |
                    echo "Este trabjo se ejecuta en un runner de windows"
                    echo "$RUNNER_OS"

              