name: 03 - runners de workflow
on: workflow_dispatch

jobs:
    ubuntu-echo:
        runs-on: ubuntu-latest
        steps:
            - name: "Mostrar SO"
              run: | 
                    echo "Este trabajo se ejecuta en runner de Ubuntu" 
                    echo "$RUNNER_OS"
    windows-echo:
        runs-on: windows-latest
        steps:
            - name: "Mostrar SO"
              shell: bash
              run: |
                    echo "Este trabjo se ejecuta en un runner de Windows"
                    echo "$RUNNER_OS"
    mac-echo:
        runs-on: macos-latest
        steps:
            - name: "Mostrar SO"
              run: |
                    echo "Este trabajo se ejucuta en un runner MacOS"
                    echo "$RUNNER_OS"
              