name: 14 - Using Cache
on:
    workflow_dispatch: 
        inputs:
            use-cache:
                description: "Whether to execute cache step"
                type: boolean
                default: true
jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 14-caching/my-app
        steps:
            - name: "Checkout code"
              uses: actions/checkout@v4
              with:
                path: 14-caching/my-app
            - name: "Setup Node"
              uses: actions/setup-node@v4
              with:
                node-version: '20.x'
            - name: "Install dependencies"  
              run: npm ci
            - name: "Testing"
              run: npm run test
            - name: "Building"
              run: npm run build
            - name: "Deploying to nonprod"
              run: echo "Deploying to nonprod"
              
