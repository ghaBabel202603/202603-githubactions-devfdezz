name: 04 -  Uso de Actions
on: push

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: "checkout code"
              uses: Actions/checkout@v4
            - name: "node setup"
              uses: actions/setup-node@v4
              with:
                node-version: '18'
            - name: "install dependencies"
              working-directory: ./my-app
              run: npm ci              
            - name: "run init test"
              working-directory: ./my-app
              run: npm run test
