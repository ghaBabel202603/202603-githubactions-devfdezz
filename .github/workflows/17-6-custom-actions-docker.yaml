name: 17 - 6 - Custom Actions - Docker.
on:
    workflow_dispatch: 
        inputs:
            name:
                type: string
                default: "World"
jobs:
    hello-to-you-docker:
        runs-on: ubuntu-latest
        steps:
            - name: Chekout repo
              uses: actions/checkout@v5

            - name: Hello to You
              uses: ./.github/actions/hello-to-you-docker
              with:
                name: ${{ inputs.name }}