name: 15 - Working with artifacts
on: [workflow_dispatch]
jobs:
    test-build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 15-artifacts/my-app
        steps:
            - name: "Checkout code"
              uses: actions/checkout@v4
            - name: "Setup Node"
              uses: actions/setup-node@v4
              with:
                node-version: '20.x'
            - name: "Download cached dependencies"
              id: cache-node-eje15
              uses: actions/cache@v3
              with:
                key: deps-node-modules-eje15-${{ hashFiles('15-artifacts/my-app/package-lock.json') }}
                path: 15-artifacts/my-app/node_modules
            - name: "Install dependencies"  
              if: steps.cache-node-eje15.outputs.cache-hit != 'true'
              run: npm ci
            - name: "Unit Tests"
              run: npm run test
            - name: "Build code"
              run: npm run build
            - name: "Upload build files"
              uses: actions/upload-artifacts@v4
              with:
                name: app
                path: 15-artifacts/my-app
    deploy:
        runs-on: ubuntu-latest
        needs: 
          - test-build
        steps:
           - name: "Download build files"
             uses: actions/download-artifact@v4
             with:
               name: app
               path: build
